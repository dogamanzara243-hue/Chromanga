kook<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okuyucu - Chromanga</title>
    <style>
        body { background: #050505; color: white; margin: 0; font-family: sans-serif; }
        .nav-bar { background: #111; padding: 15px; text-align: center; border-bottom: 2px solid #ff4500; position: sticky; top: 0; z-index: 100; }
        .ad-space { background: #1a1a1a; min-height: 100px; display: flex; align-items: center; justify-content: center; margin: 15px auto; max-width: 800px; border: 1px dashed #444; }
        #viewer { width: 100%; max-width: 800px; margin: 0 auto; }
        #viewer img { width: 100%; display: block; margin-bottom: 3px; }
        .loading { padding: 50px; text-align: center; color: #ff4500; font-weight: bold; }
        .footer-nav { padding: 20px; text-align: center; background: #111; }
        .btn { background: #ff4500; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; margin: 0 10px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" style="color:white; text-decoration:none;">🏠 Ana Sayfa</a>
    </div>

    <div class="ad-space">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-xxx" data-ad-slot="xxx"></ins>
        <p style="color:#666; font-size:12px;">ÜST REKLAM ALANI</p>
    </div>

    <div id="viewer">
        <div class="loading">Bölüm Hazırlanıyor...</div>
    </div>

    <div class="ad-space">
        <p style="color:#666; font-size:12px;">ALT REKLAM ALANI</p>
    </div>

    <div class="footer-nav">
        <a href="#" id="prevBtn" class="btn">Önceki</a>
        <a href="#" id="nextBtn" class="btn">Sonraki</a>
    </div>

    <script>
    // 1. URL'den Parametreleri Al (Örn: ?manga=solo-spell-caster&bolum=1)
    const urlParams = new URLSearchParams(window.location.search);
    const mangaSlug = urlParams.get('manga');
    const bolumNo = urlParams.get('bolum');

    async function bolumYukle() {
        if (!mangaSlug || !bolumNo) {
            alert("Manga veya bölüm bilgisi URL'de bulunamadı!");
            return;
        }

        // GitHub JSON Linki (Senin verdiğin formatta)
        const jsonUrl = `https://raw.githubusercontent.com/dogamanzara243-hue/Chromanga/main/veriler/${mangaSlug}.json`;
        
        console.log("Aranan Dosya:", jsonUrl); // F12 konsolunda neyi aradığını görelim

        try {
            const response = await fetch(jsonUrl);
            
            if (!response.ok) {
                throw new Error(`Dosya bulunamadı! Lütfen GitHub'da 'veriler/${mangaSlug}.json' olduğundan emin ol.`);
            }
            
            const data = await response.json();
            
            // Bölümü id'ye göre bul
            const bolum = data.chapters.find(ch => String(ch.id) === String(bolumNo));
            
            const resimAlani = document.getElementById('manga-resim-alani');
            resimAlani.innerHTML = ''; // Sayfayı temizle

            if (bolum && bolum.images) {
                bolum.images.forEach(imgUrl => {
                    const img = document.createElement('img');
                    img.src = imgUrl;
                    img.style.width = '100%';
                    img.style.display = 'block';
                    img.loading = 'lazy'; 
                    resimAlani.appendChild(img);
                });
                console.log(`Bölüm ${bolumNo} başarıyla yüklendi.`);
            } else {
                resimAlani.innerHTML = `<p style="color:white; text-align:center;">Bölüm ${bolumNo} henüz sisteme eklenmemiş kardo!</p>`;
            }

        } catch (error) {
            console.error("Hata Detayı:", error);
            alert("Hata: " + error.message);
        }
    }

    // Fonksiyonu Çalıştır
    bolumYukle();
    </script>
</body>
</html>
