<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okuyucu - Chromanga</title>
    <style>
        body { background: #050505; color: white; margin: 0; font-family: sans-serif; }
        .nav-bar { background: #111; padding: 15px; text-align: center; border-bottom: 2px solid #ff4500; position: sticky; top: 0; z-index: 100; }
        .ad-space { background: #1a1a1a; min-height: 100px; display: flex; align-items: center; justify-content: center; margin: 15px auto; max-width: 800px; border: 1px dashed #444; }
        #viewer { width: 100%; max-width: 800px; margin: 0 auto; }
        #viewer img { width: 100%; display: block; margin-bottom: 3px; }
        .loading { padding: 50px; text-align: center; color: #ff4500; font-weight: bold; }
        .footer-nav { padding: 20px; text-align: center; background: #111; }
        .btn { background: #ff4500; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; margin: 0 10px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" style="color:white; text-decoration:none;">🏠 Ana Sayfa</a>
    </div>

    <div class="ad-space">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-xxx" data-ad-slot="xxx"></ins>
        <p style="color:#666; font-size:12px;">ÜST REKLAM ALANI</p>
    </div>

    <div id="viewer">
        <div class="loading">Bölüm Hazırlanıyor...</div>
    </div>

    <div class="ad-space">
        <p style="color:#666; font-size:12px;">ALT REKLAM ALANI</p>
    </div>

    <div class="footer-nav">
        <a href="#" id="prevBtn" class="btn">Önceki</a>
        <a href="#" id="nextBtn" class="btn">Sonraki</a>
    </div>

    <script>
        async function loadChapter() {
            const params = new URLSearchParams(window.location.search);
            const manga = params.get('manga');
            const ch = parseInt(params.get('ch'));
            const viewer = document.getElementById('viewer');

            // Navigasyon butonlarını ayarla
            document.getElementById('prevBtn').href = `reader.html?manga=${manga}&ch=${ch - 1}`;
            document.getElementById('nextBtn').href = `reader.html?manga=${manga}&ch=${ch + 1}`;

            try {
                // 1. Manganın temel verilerini (kaynak linkini) çek
                const res = await fetch(`../veriler/romantik/${manga}.json`);
                const data = await res.json();
                
                // 2. Proxy üzerinden kaynağa bağlan
                const targetUrl = `${data.kaynak_link}bolum-${ch}/`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
                
                const response = await fetch(proxyUrl);
                const result = await response.json();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(result.contents, 'text/html');
                
                // Mangazure/Madara teması resimlerini bul
                const images = Array.from(doc.querySelectorAll('.reading-content img'));

                if(images.length > 0) {
                    viewer.innerHTML = '';
                    images.forEach(img => {
                        const newImg = document.createElement('img');
                        // Lazy load varsa data-src'yi, yoksa normal src'yi al
                        newImg.src = img.getAttribute('data-src') || img.getAttribute('data-lazy-src') || img.src;
                        viewer.appendChild(newImg);
                    });
                } else {
                    viewer.innerHTML = '<div class="loading">Bu bölüm henüz yüklenmemiş veya kaynak site engelliyor.</div>';
                }
            } catch (e) {
                viewer.innerHTML = '<div class="loading">Hata: Kaynak bağlantısı kurulamadı.</div>';
            }
        }
        loadChapter();
    </script>
</body>
</html>
