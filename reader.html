<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chromanga Okuyucu</title>
    <style>
        body { background: #050505; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #viewer { width: 100%; max-width: 800px; }
        #viewer img { width: 100%; display: block; margin-bottom: 2px; }
        .loading { padding: 50px; text-align: center; font-family: sans-serif; color: #ff4500; }
    </style>
</head>
<body>
    <div id="viewer"><div class="loading">Bölüm Hazırlanıyor, Lütfen Bekleyin...</div></div>

    <script>
        async function loadChapter() {
            const params = new URLSearchParams(window.location.search);
            const manga = params.get('manga');
            const ch = params.get('ch');
            const viewer = document.getElementById('viewer');

            try {
                // 1. Kendi verilerinden manganın kaynak linkini bul
                const res = await fetch(`../veriler/romantik/${manga}.json`); // Tür dinamik yapılabilir
                const data = await res.json();
                
                // 2. Proxy üzerinden Mangazure'den canlı resimleri çek
                // (Allorigins proxy'si sayesinde engel aşılıyor)
                const targetUrl = `${data.kaynak_link}bolum-${ch}/`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
                
                const response = await fetch(proxyUrl);
                const result = await response.json();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(result.contents, 'text/html');
                const images = Array.from(doc.querySelectorAll('.reading-content img'));

                if(images.length > 0) {
                    viewer.innerHTML = '';
                    images.forEach(img => {
                        const newImg = document.createElement('img');
                        newImg.src = img.getAttribute('data-src') || img.src;
                        viewer.appendChild(newImg);
                    });
                } else {
                    viewer.innerHTML = '<div class="loading">Resimler çekilemedi. Kaynak site korumalı olabilir.</div>';
                }
            } catch (e) {
                viewer.innerHTML = '<div class="loading">Hata: Bölüm yüklenemedi.</div>';
            }
        }
        loadChapter();
    </script>
</body>
</html>
