<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Long Live The King - Chromanga</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body style="background:#111; color:white; font-family:sans-serif; padding:20px;">
    <a href="../index.html" style="color:#ff4500; text-decoration:none;">← Geri Dön</a>
    <div style="display:flex; gap:20px; background:#222; padding:20px; border-radius:10px; margin-top:20px;">
        <img src="../kapaklar/long-live-the-king.png" style="width:150px; border-radius:5px;">
        <div><h1>Long Live The King</h1><p>Zayıf bir kralın oyun yetenekleriyle güçlenmesi.</p></div>
    </div>
    <div id="chapters" style="margin-top:30px;"><h3>Bölümler Yükleniyor...</h3></div>
    <script>
        async function load() {
            const r = await fetch('../veriler/fantazi/long-live-the-king.json');
            const d = await r.json();
            const box = document.getElementById('chapters');
            box.innerHTML = '<h3>Bölüm Listesi</h3>';
            d.chapters.forEach(ch => {
                box.innerHTML += `<a href="../reader.html?manga=long-live-the-king&ch=${ch.id}" style="display:block; background:#333; color:white; padding:15px; margin:10px 0; text-decoration:none; border-radius:5px; border-left:4px solid #ff4500;">${ch.name}</a>`;
            });
        }
        load();
    </script>
</body></html>
