
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorize - Chromanga</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .header { display: flex; gap: 20px; background: #1e1e1e; padding: 20px; border-radius: 12px; }
        .header img { width: 140px; border-radius: 8px; }
        .chapter-item { display: block; background: #2a2a2a; padding: 15px; margin: 10px 0; border-radius: 6px; text-decoration: none; color: white; border-left: 4px solid #ff4500; }
        .btn-back { color: #ff4500; text-decoration: none; display: block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="btn-back">← Geri Dön</a>
        <div class="header">
            <img src="../kapaklar/Memorize.jpg" alt="Memorize">
            <div>
                <h1>Memorize</h1>
                <p>Zamanda geri dönen oyuncu.</p>
            </div>
        </div>
        <div id="chapter-list"><h3>Bölümler Aranıyor...</h3></div>
    </div>

    <script>
        async function bolumleriYukle() {
            // BU SEFER GÖRECELİ YOL KULLANIYORUZ (DAHA GÜVENLİ)
            const jsonYolu = '../veriler/aksiyon/memorize.json';
            
            try {
                const r = await fetch(jsonYolu);
                if (!r.ok) throw new Error("Dosya yok");
                const data = await r.json();
                
                const box = document.getElementById('chapter-list');
                box.innerHTML = '<h3>Bölüm Listesi</h3>';
                
                if(data.chapters && data.chapters.length > 0) {
                    data.chapters.forEach(ch => {
                        box.innerHTML += `<a href="../reader.html?manga=memorize&ch=${ch.id}" class="chapter-item">${ch.name}</a>`;
                    });
                } else {
                    box.innerHTML = '<p>Henüz bölüm eklenmemiş.</p>';
                }
            } catch(e) {
                // EĞER ÜSTTEKİ OLMAZSA BİR DE RAW'DAN DENE (YEDEK PLAN)
                const yedekUrl = 'https://raw.githubusercontent.com/dogamanzara243-hue/Chromanga/main/veriler/aksiyon/memorize.json';
                const r2 = await fetch(yedekUrl);
                const data2 = await r2.json();
                document.getElementById('chapter-list').innerHTML = '<h3>Bölüm Listesi (Yedek Sunucu)</h3>';
                data2.chapters.forEach(ch => {
                    document.getElementById('chapter-list').innerHTML += `<a href="#" class="chapter-item">${ch.name}</a>`;
                });
            }
        }
        bolumleriYukle();
    </script>
</body>
</html>
