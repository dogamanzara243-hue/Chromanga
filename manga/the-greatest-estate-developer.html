
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Greatest Estate Developer - Chromanga</title>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .header { display: flex; gap: 20px; background: #1e1e1e; padding: 20px; border-radius: 12px; align-items: center; }
        .header img { width: 150px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .info h1 { margin: 0; color: #ff4500; }
        .chapters { margin-top: 30px; }
        .chapter-item { display: block; background: #2a2a2a; padding: 15px; margin-bottom: 8px; border-radius: 6px; text-decoration: none; color: #eee; transition: 0.2s; }
        .chapter-item:hover { background: #ff4500; color: white; transform: translateX(5px); }
        .btn-back { color: #aaa; text-decoration: none; display: inline-block; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="btn-back">← Ana Sayfaya Dön</a>
        <div class="header">
            <img src="https://raw.githubusercontent.com/dogamanzara243-hue/Chromanga/main/kapaklar/the-greatest-estate-developer.jpg" alt="The Greatest Estate Developer">
            <div class="info">
                <h1>The Greatest Estate Developer</h1>
                <p>Mühendislik zekasıyla fantezi dünyası.</p>
            </div>
        </div>
        <div class="chapters" id="chapter-list">
            <h3>Bölümler Yükleniyor...</h3>
        </div>
    </div>

    <script>
        async function bolumleriCek() {
            // DOSYA YOLUNU ZORLA (RAW GITHUB ÜZERİNDEN)
            const url = 'https://raw.githubusercontent.com/dogamanzara243-hue/Chromanga/main/veriler/komedi/the-greatest-estate-developer.json';
            try {
                const r = await fetch(url);
                const data = await r.json();
                const box = document.getElementById('chapter-list');
                box.innerHTML = '<h3>Bölüm Listesi</h3>';
                
                if(data.chapters && data.chapters.length > 0) {
                    data.chapters.forEach(ch => {
                        box.innerHTML += `<a href="#" class="chapter-item">${ch.name}</a>`;
                    });
                } else {
                    box.innerHTML += '<p style="color:#666;">Henüz bölüm eklenmemiş.</p>';
                }
            } catch(e) {
                document.getElementById('chapter-list').innerHTML = '<h3>Hata: Bölümler yüklenemedi.</h3>';
            }
        }
        bolumleriCek();
    </script>
</body>
</html>
