 <!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Chromanga | HD Manga Oku</title>
    <style>
        :root { --accent: #ff4757; --bg: #0a0a0c; --card: #16161a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        header { padding: 20px; text-align: center; border-bottom: 2px solid var(--accent); background: #000; }
        .logo { font-size: 24px; font-weight: bold; }
        .logo span { color: var(--accent); }
.container { 
            padding: 10px; 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: flex-start; /* Kartları sola yasla */
            gap: 10px; /* Aradaki boşluk */
            max-width: 800px; 
            margin: 0 auto; 
        }
        
        .manga-card { 
            background: var(--card); 
            border-radius: 10px; 
            overflow: hidden; 
            /* GENİŞLİK AYARI: %50'den biraz daha küçük yapıyoruz (boşluklar için) */
            width: calc(50% - 15px); 
            cursor: pointer; 
            border: 1px solid #222; 
        }

        .manga-card img { 
            width: 100%; 
            height: 220px; /* Mobilde daha kibar durması için ideal boy */
            object-fit: cover; 
        }

        /* DETAY PANELİ */
        #detail-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .detail-content { max-width: 600px; margin: 0 auto; text-align: center; }
        .detail-content img { width: 200px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .detail-title { font-size: 24px; margin: 15px 0; color: var(--accent); }
        .detail-desc { color: #ccc; line-height: 1.6; margin-bottom: 20px; }
        
        /* OKUYUCU EKRANI */
        #reader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; overflow-y: auto; }
        .nav-bar { position: sticky; top: 0; background: rgba(0,0,0,0.9); padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .view-area img { width: 100%; max-width: 800px; display: block; margin: 0 auto; }

        .btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-close { background: #333; margin-top: 10px; }
    </style>
</head>
<body>

<div id="home">
    <header><div class="logo">CHRO<span>MANGA</span></div></header>
    <div class="container" id="manga-list"></div>
</div>

<div id="detail-view">
    <div class="detail-content">
        <img id="detail-img" src="">
        <div class="detail-title" id="detail-title"></div>
        <div class="detail-desc" id="detail-desc"></div>
        <button class="btn" onclick="startReading()">Bölümü Oku</button>
        <br>
        <button class="btn btn-close" onclick="closeDetail()">Geri Dön</button>
    </div>
</div>

<div id="reader">
    <div class="nav-bar">
        <button class="btn" onclick="closeReader()">← Geri</button>
        <div id="chapter-label"></div>
        <div style="width: 40px;"></div>
    </div>
    <div class="view-area" id="manga-images"></div>
</div>

<script>
    const mangaData = [
        {
            title: "Belalı",
            desc: "Sokakların kurallarını yeniden yazan bir gencin aksiyon dolu hikayesi. Adalet mi yoksa intikam mı?",
            cover: "https://i.ibb.co/MkW5pHKG/Screenshot-2026-03-09-19-57-38-392-com-miui-gallery.jpg",
            images: [
                "https://i.ibb.co/MkW5pHKG/Screenshot-2026-03-09-19-57-38-392-com-miui-gallery.jpg",
                "https://i.ibb.co/vxJwY8Wz/Screenshot-2026-03-09-19-57-41-883-com-miui-gallery.jpg",
                "https://i.ibb.co/G37CYMVH/Screenshot-2026-03-09-19-57-46-627-com-miui-gallery.jpg"
            ]
        },
        {
            title: "Eski Stalker'a Karşı",
            desc: "Geçmişin gölgeleri peşini bırakmıyor. Gizemli bir takipçi ve korku dolu anlar bu mangada sizi bekliyor.",
            cover: "https://i.ibb.co/pvq1zWP2/Eski-Stalker-a-Kar-3-page-0001.jpg",
            images: [
                "https://i.ibb.co/pvq1zWP2/Eski-Stalker-a-Kar-3-page-0001.jpg",
                "https://i.ibb.co/VYYpcTSS/Eski-Stalker-a-Kar-3-page-0002.jpg",
                "https://i.ibb.co/RVfxDJ0/Eski-Stalker-a-Kar-3-page-0003.jpg"
            ]
        }
    ];

    let currentMangaIndex = 0;

    // Ana Sayfayı Doldur
    const list = document.getElementById('manga-list');
    mangaData.forEach((manga, index) => {
        list.innerHTML += `
            <div class="manga-card" onclick="openDetail(${index})">
                <img src="${manga.cover}">
                <div class="manga-info">${manga.title}</div>
            </div>
        `;
    });

    function openDetail(index) {
        currentMangaIndex = index;
        const manga = mangaData[index];
        document.getElementById('detail-img').src = manga.cover;
        document.getElementById('detail-title').innerText = manga.title;
        document.getElementById('detail-desc').innerText = manga.desc;
        document.getElementById('detail-view').style.display = 'block';
    }

    function closeDetail() {
        document.getElementById('detail-view').style.display = 'none';
    }

    function startReading() {
        const manga = mangaData[currentMangaIndex];
        const box = document.getElementById('manga-images');
        box.innerHTML = manga.images.map(url => `<img src="${url}" loading="lazy">`).join('');
        document.getElementById('chapter-label').innerText = manga.title;
        document.getElementById('reader').style.display = 'block';
    }

    function closeReader() {
        document.getElementById('reader').style.display = 'none';
    }
</script>

</body>
</html>
