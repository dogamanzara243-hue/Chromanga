<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chromanga - Manga Oku</title>
    <style>
        :root { --primary: #00ffcc; --bg: #0a0a0a; --card: #151515; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1000px; margin: auto; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid #222; }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card h3 { padding: 10px; margin: 0; font-size: 14px; text-align: center; }
        #reader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; overflow-y: auto; z-index: 100; }
        .reader-img { width: 100%; display: block; margin-bottom: 2px; }
        .close-btn { position: fixed; top: 10px; right: 10px; background: red; color: white; border: none; padding: 10px; border-radius: 5px; z-index: 101; cursor: pointer; }
        #detail { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 90; padding: 20px; box-sizing: border-box; }
        .chapter-btn { display: block; background: var(--card); color: var(--primary); padding: 15px; margin-top: 10px; text-decoration: none; border-radius: 5px; border: 1px solid var(--primary); text-align: center; }
    </style>
</head>
<body>

    <h2 style="text-align: center; color: var(--primary);">Chromanga</h2>
    <div id="manga-list" class="grid"></div>

    <div id="detail">
        <button onclick="document.getElementById('detail').style.display='none'" class="close-btn">Kapat</button>
        <div id="detail-content"></div>
    </div>

    <div id="reader">
        <button onclick="document.getElementById('reader').style.display='none'" class="close-btn">Çık</button>
        <div id="reader-images"></div>
    </div>

    <script>
        let mangaData = [];

        async function fetchData() {
    try {
        // Önce ana listeyi (dosya isimlerini) alıyoruz
        const response = await fetch('data.json');
        const mangaFiles = await response.json();

        const mangaList = document.getElementById('manga-list');
        mangaList.innerHTML = ""; // Listeyi temizle

        // Her bir JSON dosyası için veriyi çekiyoruz
        for (const file of mangaFiles) {
            const res = await fetch(file);
            const manga = await res.json();
            
            // Kartı oluştur ve ekrana ekle
            const card = document.createElement('div');
            card.className = 'manga-card';
            card.innerHTML = `
                <img src="${manga.cover}" alt="${manga.title}">
                <h3>${manga.title}</h3>
                <p>${manga.desc}</p>
            `;
            card.onclick = () => showChapters(manga);
            mangaList.appendChild(card);
        }
    } catch (error) {
        console.error("Veri çekme hatası:", error);
    }
        }

        loadManga();
    </script>
</body>
</html>
