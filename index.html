<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chromanga - Türkçe Manga ve Webtoon Portalı</title>
    <meta name="description" content="En güncel aksiyon, romantik ve sistem mangalarını Türkçe oku.">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .kategori-baslik { border-bottom: 2px solid #ff4500; padding-bottom: 5px; margin-top: 30px; color: #ff4500; }
        .manga-listesi { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; padding: 20px 0; }
        .manga-kart { background: #2a2a2a; border-radius: 8px; overflow: hidden; transition: 0.3s; text-decoration: none; color: white; }
        .manga-kart:hover { transform: scale(1.05); }
        .manga-kart img { width: 100%; height: 220px; object-fit: cover; }
        .manga-kart h3 { font-size: 14px; padding: 10px; margin: 0; text-align: center; }
    </style>
</head>
<body>

    <header>
        <h1>🌟 CHROMANGA</h1>
        <p>Hızlı, Reklamsız, Güncel Manga Keyfi</p>
    </header>

    <div id="ana-icerik">
        </div>

<script>
    async function mangalariGetir() {
        // GitHub kullanıcı adın ve depo adın
        const repoOwner = "dogamanzara243-hue";
        const repoName = "Chromanga";
        
        // Klasör yollarını ve dosya adını GitHub API üzerinden değil, direkt URL'den zorluyoruz
        const url = `https://raw.githubusercontent.com/${repoOwner}/${repoName}/main/ayarlar/is_listesi.json`;

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error("Dosya çekilemedi!");
            const data = await response.json();
            
            const container = document.getElementById('ana-icerik');
            container.innerHTML = '';

            const gruplar = {};
            data.forEach(manga => {
                if(!gruplar[manga.type]) gruplar[manga.type] = [];
                gruplar[manga.type].push(manga);
            });

            for(let tur in gruplar) {
                const baslik = document.createElement('h2');
                baslik.className = 'kategori-baslik';
                baslik.innerText = tur.toUpperCase();
                container.appendChild(baslik);

                const liste = document.createElement('div');
                liste.className = 'manga-listesi';

                gruplar[tur].forEach(manga => {
                    liste.innerHTML += `
                        <a href="manga/${manga.url}.html" class="manga-kart">
                            <img src="kapaklar/${manga.cover}" alt="${manga.title}" onerror="this.src='https://via.placeholder.com/150x220?text=Resim+Bulunamadi'">
                            <h3>${manga.title}</h3>
                        </a>
                    `;
                });
                container.appendChild(liste);
            }
        } catch (error) {
            console.error("Hata:", error);
            document.getElementById('ana-icerik').innerHTML = "<p style='text-align:center;'>Veriler yüklenirken bir sorun oluştu. Lütfen is_listesi.json dosyasını kontrol edin.</p>";
        }
    }

    mangalariGetir();
                </script>
</body>
</html>
