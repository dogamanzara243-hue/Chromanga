<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chromanga - Türkçe Manga ve Webtoon Portalı</title>
    <meta name="description" content="En güncel aksiyon, romantik ve sistem mangalarını Türkçe oku.">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .kategori-baslik { border-bottom: 2px solid #ff4500; padding-bottom: 5px; margin-top: 30px; color: #ff4500; }
        .manga-listesi { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; padding: 20px 0; }
        .manga-kart { background: #2a2a2a; border-radius: 8px; overflow: hidden; transition: 0.3s; text-decoration: none; color: white; }
        .manga-kart:hover { transform: scale(1.05); }
        .manga-kart img { width: 100%; height: 220px; object-fit: cover; }
        .manga-kart h3 { font-size: 14px; padding: 10px; margin: 0; text-align: center; }
    </style>
</head>
<body>

    <header>
        <h1>🌟 CHROMANGA</h1>
        <p>Hızlı, Reklamsız, Güncel Manga Keyfi</p>
    </header>

    <div id="ana-icerik">
        </div>

<script>
    async function mangalariYukle() {
        const container = document.getElementById('ana-icerik');
        // Senin GitHub kullanıcı adın ve depona göre ayarlandı
        const url = 'https://raw.githubusercontent.com/dogamanzara243-hue/Chromanga/main/ayarlar/is_listesi.json';

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error("Liste dosyası çekilemedi!");
            const data = await response.json();
            
            container.innerHTML = ''; // Yükleniyor yazısını temizle

            // Kategorileri Grupla
            const gruplar = {};
            data.forEach(manga => {
                if (!gruplar[manga.type]) {
                    gruplar[manga.type] = [];
                }
                gruplar[manga.type].push(manga); // 'append' değil 'push' olmalı
            });

            // Ekrana Yazdır
            for (let tur in gruplar) {
                const section = document.createElement('div');
                section.innerHTML = `<h2 class="kategori-baslik">${tur.toUpperCase()}</h2>`;
                
                const liste = document.createElement('div');
                liste.className = 'manga-listesi';

                gruplar[tur].forEach(manga => {
                    liste.innerHTML += `
                        <a href="manga/${manga.url}.html" class="manga-kart">
                            <img src="kapaklar/${manga.cover}" alt="${manga.title}" onerror="this.src='https://via.placeholder.com/150x220?text=Resim+Yok'">
                            <h3>${manga.title}</h3>
                        </a>
                    `;
                });

                section.appendChild(liste);
                container.appendChild(section);
            }
        } catch (error) {
            console.error("Hata:", error);
            container.innerHTML = `<p style="text-align:center; padding:50px;">⚠️ Mangalar şu an yüklenemedi. <br><small>${error.message}</small></p>`;
        }
    }

    // Sayfa açıldığında çalıştır
    window.onload = mangalariYukle;
                                     </script>
</body>
</html>
