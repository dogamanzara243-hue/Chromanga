<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chromanga - Türkçe Manga ve Webtoon Portalı</title>
    <meta name="description" content="En güncel aksiyon, romantik ve sistem mangalarını Türkçe oku.">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .kategori-baslik { border-bottom: 2px solid #ff4500; padding-bottom: 5px; margin-top: 30px; color: #ff4500; }
        .manga-listesi { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; padding: 20px 0; }
        .manga-kart { background: #2a2a2a; border-radius: 8px; overflow: hidden; transition: 0.3s; text-decoration: none; color: white; }
        .manga-kart:hover { transform: scale(1.05); }
        .manga-kart img { width: 100%; height: 220px; object-fit: cover; }
        .manga-kart h3 { font-size: 14px; padding: 10px; margin: 0; text-align: center; }
    </style>
</head>
<body>

    <header>
        <h1>🌟 CHROMANGA</h1>
        <p>Hızlı, Reklamsız, Güncel Manga Keyfi</p>
    </header>

    <div id="ana-icerik">
        </div>

<script>
    // GitHub Pages için dosya yolunu dinamik hale getirdik
    const dosyaYolu = 'ayarlar/is_listesi.json';

    fetch(dosyaYolu)
        .then(res => {
            if (!res.ok) throw new Error('Dosya bulunamadı: ' + res.status);
            return res.json();
        })
        .then(data => {
            const container = document.getElementById('ana-icerik');
            container.innerHTML = ''; 

            const gruplar = {};
            data.forEach(manga => {
                if(!gruplar[manga.type]) gruplar[manga.type] = [];
                gruplar[manga.type].push(manga);
            });

            for(let tur in gruplar) {
                const section = document.createElement('section');
                section.innerHTML = `<h2 class="kategori-baslik">${tur.toUpperCase()}</h2>`;
                
                const liste = document.createElement('div');
                liste.className = 'manga-listesi';

                gruplar[tur].forEach(manga => {
                    // Resim yolu kontrolü: kapaklar/ klasöründen alıyor
                    const resimYolu = `kapaklar/${manga.cover}`;
                    
                    liste.innerHTML += `
                        <a href="manga/${manga.url}.html" class="manga-kart">
                            <img src="${resimYolu}" alt="${manga.title}" onerror="this.src='https://via.placeholder.com/150x220?text=Resim+Yuklenemedi'">
                            <h3>${manga.title}</h3>
                        </a>
                    `;
                });

                section.appendChild(liste);
                container.appendChild(section);
            }
        })
        .catch(err => {
            console.error('Hata Detayı:', err);
            document.getElementById('ana-icerik').innerHTML = `
                <div style="text-align:center; padding:50px;">
                    <p style="color:#ff4500;">⚠️ Mangalar şu an yüklenemiyor.</p>
                    <small style="color:#666;">Hata: ${err.message}</small>
                </div>`;
        });
</script>
</body>
</html>
