<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chromanga - Manga Oku</title>
    <style>
        :root {
            --primary: #6200ea;
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            padding-bottom: 30px;
        }
        .manga-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .manga-card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
            border: 1px solid #333;
        }
        .manga-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }
        .manga-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }
        .manga-info {
            padding: 15px;
        }
        .manga-info h3 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
        }
        .manga-info p {
            font-size: 0.85rem;
            color: #bbb;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        #reader {
            display: none;
            max-width: 800px;
            margin: 0 auto;
        }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .chapter-list button {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            background: #2a2a2a;
            color: white;
            border: 1px solid #444;
            text-align: left;
            border-radius: 5px;
            cursor: pointer;
        }
        .manga-images img {
            width: 100%;
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <header id="main-header">
        <h1>Chromanga</h1>
        <p>Favori mangalarını keşfet</p>
    </header>

    <div id="manga-list" class="manga-grid">
        <p>Mangalar yükleniyor...</p>
    </div>

    <div id="reader">
        <button class="btn" onclick="goBack()">← Geri Dön</button>
        <h2 id="manga-title"></h2>
        <div id="chapter-selection" class="chapter-list"></div>
        <div id="manga-pages" class="manga-images"></div>
    </div>

    <script>
        // YENİ SİSTEM: LİSTEYİ OKU VE DOSYALARI ÇEK
        async function fetchData() {
            const mangaListDiv = document.getElementById('manga-list');
            try {
                // 1. Önce data.json'dan dosya isimlerini alıyoruz
                const response = await fetch('data.json');
                const mangaFiles = await response.json();

                mangaListDiv.innerHTML = ""; 

                // 2. Listedeki her bir JSON dosyası (akame.json, primal.json vb.) için döngü
                for (const fileName of mangaFiles) {
                    try {
                        const res = await fetch(fileName);
                        const manga = await res.json();
                        
                        const card = document.createElement('div');
                        card.className = 'manga-card';
                        card.innerHTML = `
                            <img src="${manga.cover}" alt="${manga.title}">
                            <div class="manga-info">
                                <h3>${manga.title}</h3>
                                <p>${manga.desc}</p>
                            </div>
                        `;
                        card.onclick = () => showMangaDetails(manga);
                        mangaListDiv.appendChild(card);
                    } catch (err) {
                        console.error(fileName + " yüklenemedi:", err);
                    }
                }
            } catch (error) {
                mangaListDiv.innerHTML = "<p>Hata: data.json okunamadı.</p>";
            }
        }

        function showMangaDetails(manga) {
            document.getElementById('manga-list').style.display = 'none';
            document.getElementById('main-header').style.display = 'none';
            const reader = document.getElementById('reader');
            reader.style.display = 'block';

            document.getElementById('manga-title').innerText = manga.title;
            const chapterDiv = document.getElementById('chapter-selection');
            chapterDiv.innerHTML = "";
            document.getElementById('manga-pages').innerHTML = "";

            manga.chapters.forEach(chapter => {
                const btn = document.createElement('button');
                btn.innerText = chapter.name;
                btn.onclick = () => showChapterImages(chapter.images);
                chapterDiv.appendChild(btn);
            });
        }

        function showChapterImages(images) {
            document.getElementById('chapter-selection').style.display = 'none';
            const pagesDiv = document.getElementById('manga-pages');
            pagesDiv.innerHTML = "";

            images.forEach(imgUrl => {
                const img = document.createElement('img');
                img.src = imgUrl;
                img.loading = "lazy"; 
                pagesDiv.appendChild(img);
            });
        }

        function goBack() {
            const pagesDiv = document.getElementById('manga-pages');
            const chapterDiv = document.getElementById('chapter-selection');

            if (pagesDiv.innerHTML !== "") {
                pagesDiv.innerHTML = "";
                chapterDiv.style.display = 'block';
                window.scrollTo(0,0);
            } else {
                document.getElementById('reader').style.display = 'none';
                document.getElementById('manga-list').style.display = 'grid';
                document.getElementById('main-header').style.display = 'block';
            }
        }

        fetchData();
    </script>
</body>
</html>
